<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .container {
            background: white;
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        p { font-size: 1.2em; line-height: 1.8; margin-bottom: 15px; color: #666; }
        .links { margin-top: 30px; }
        .links a {
            display: inline-block;
            margin: 5px 10px;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            transition: 0.3s;
        }
        .links a:hover {
            background: #764ba2;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .emoji { font-size: 4em; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">👋</div>
        <h1>你好,我是 YOUZI</h1>
        <p>欢迎来到我的个人网站</p>
        <p>这里是我的代码、笔记和思考的小角落 ✨</p>
        <div class="links">
            <a href="https://github.com/YOUZI-bala" target="_blank">我的 GitHub</a>
            <a href="mailto:1737216646zaizai@gmail.com">联系我</a>
        </div>
    </div>
</body>
</html>
